name = "vwikirace-api"
main = "src/server/worker.ts"
compatibility_date = "2026-07-08"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["0 10 * * *", "0 11 * * *", "17 * * * *"]

[[d1_databases]]
binding = "VWIKI_RACE_DB"
database_name = "vwiki-race"
database_id = "bbd89b81-078a-47e0-9db4-5d170a3f78b4"
migrations_dir = "d1/migrations"

[[services]]
binding = "VGAMES_IDENTITY"
service = "vgames-identity"

[vars]
VGAMES_URL = "https://vgames-identity.theonenonlyvj.workers.dev"
ALLOWED_ORIGINS = "https://vwikirace.pages.dev"
DAILY_ADMIN_ACCOUNT_IDS = "c02875a7-0470-5ef3-b87a-38abcbdcd952"
MAINTENANCE_MODE = "false"

[[ratelimits]]
name = "CLICK_RATE_LIMITER"
namespace_id = "51001"
simple = { limit = 180, period = 60 }

[[ratelimits]]
name = "ACCOUNT_READ_RATE_LIMITER"
namespace_id = "51002"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "CHALLENGE_CREATE_RATE_LIMITER"
namespace_id = "51003"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "CLIENT_ERROR_RATE_LIMITER"
namespace_id = "51004"
simple = { limit = 20, period = 60 }

[[ratelimits]]
name = "DAILY_ADMIN_RATE_LIMITER"
namespace_id = "51005"
simple = { limit = 30, period = 60 }

[[ratelimits]]
name = "IDENTITY_RATE_LIMITER"
namespace_id = "51006"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "RUN_START_RATE_LIMITER"
namespace_id = "51007"
simple = { limit = 6, period = 60 }

[[ratelimits]]
name = "RANDOM_CHALLENGE_RATE_LIMITER"
namespace_id = "51008"
simple = { limit = 1, period = 60 }

[[ratelimits]]
name = "RANDOM_CHALLENGE_IP_RATE_LIMITER"
namespace_id = "51009"
simple = { limit = 2, period = 60 }
